        history_heart:
          type: boolean
        history_hypertension:
          type: boolean
        history_bleeding:
          type: boolean
        history_smoker:
          type: boolean
        history_pregnant:
          type: boolean
        allergies:
          type: string
        current_medications:
          type: string
        service_id:
          type: string
        dentist_id:
          type: string
        appointment_date:
          type: string
          format: date
