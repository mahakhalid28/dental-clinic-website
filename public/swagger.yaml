        name:
          type: string
          example: Sara Ali
        email:
          type: string
          format: email
          example: sara@example.com
        phone:
          type: string
          example: '+923009876543'
        city:
          type: string
        blood_group:
          type: string
        gender:
          type: string
          enum: [male, female, other]
